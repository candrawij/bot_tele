<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BotTele Support</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f9fc;
        --card: #ffffff;
        --text: #14213d;
        --muted: #56657a;
        --primary: #2563eb;
        --primary-dark: #1d4ed8;
        --shadow: 0 14px 40px rgba(6, 24, 66, 0.12);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(180deg, #eff6ff 0%, var(--bg) 100%);
        color: var(--text);
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
      }

      .card {
        width: min(720px, 100%);
        background: var(--card);
        border-radius: 24px;
        padding: 40px;
        box-shadow: var(--shadow);
      }

      .eyebrow {
        display: inline-block;
        padding: 6px 12px;
        background: #dbeafe;
        color: #1e40af;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .btn {
        text-decoration: none;
        border: none;
        border-radius: 12px;
        padding: 14px 18px;
        font-weight: 700;
        transition: 0.18s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }

      .btn-primary:hover { background: var(--primary-dark); }

      .btn-secondary {
        background: #e5e7eb;
        color: var(--text);
      }

      .btn-secondary:hover { background: #d1d5db; }

      .floating {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 10;
      }

      .floating a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 68px;
        height: 68px;
        border-radius: 50%;
        background: #111827;
        color: white;
        text-decoration: none;
        font-size: 12px;
        font-weight: 700;
        box-shadow: 0 12px 35px rgba(17, 24, 39, 0.28);
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <div class="eyebrow">Support Telegram</div>
        <h1>Website support yang langsung terhubung ke bot Telegram</h1>
        <p>
          Halaman home ini dibuat sederhana supaya pengunjung bisa langsung masuk ke bot Telegram,
          melanjutkan percakapan ke CS, atau menampilkan dashboard admin dengan satu klik.
        </p>

        <div class="actions">
          <a class="btn btn-primary" href="https://t.me/top_upin_bot?start=website-customer-user-12345-ticket-0001-open_ticket">
            Chat dengan CS
          </a>
          <a class="btn btn-secondary" href="https://t.me/top_upin_bot?start=website-admin-dashboard">
            Admin Chat
          </a>
        </div>
      </section>
    </main>

    <div class="floating">
      <a href="https://t.me/top_upin_bot?start=website-cs-list" title="Open bot Telegram">
        BOT
      </a>
    </div>
  </body>
</html>
